apiVersion: v1
kind: PersistentVolume
metadata:
  name: slskd-pv
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 1700Gi
  local:
    path: /meadia/external/slsk 
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - butiboi
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slskd-pvc
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1700Gi
  volumeMode: Filesystem
  volumeName: slskd-pv
---
